<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | SDDR.digital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f172a;
    color:white;
}

/* NAVBAR */
.navbar{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 8%;
    background:#020617;
}

.logo{
    color:#38bdf8;
    font-size:28px;
    font-weight:700;
}

.nav-links{
    display:flex;
    gap:25px;
    list-style:none;
}

.nav-links a{
    text-decoration:none;
    color:white;
}

.nav-links a:hover{
    color:#38bdf8;
}

/* HEADER */
header{
    text-align:center;
    padding:70px 20px;
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
}

header h1{
    font-size:50px;
}

header p{
    margin-top:10px;
    color:#e2e8f0;
}

/* CONTACT */
.contact{
    padding:70px 8%;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:700px;
    background:#1e293b;
    padding:40px;
    border-radius:25px;
}

.container h2{
    margin-bottom:25px;
    color:#38bdf8;
}

form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

input,
textarea{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    font-size:15px;
}

textarea{
    min-height:140px;
    resize:none;
}

button{
    padding:14px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:#0f172a;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:white;
}

/* FOOTER */
footer{
    margin-top:40px;
    background:#020617;
    text-align:center;
    padding:25px;
    color:#94a3b8;
}

/* MOBILE */
@media(max-width:768px){

.navbar{
    flex-direction:column;
    gap:15px;
}

header h1{
    font-size:38px;
}

}

</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo">SDDR.digital</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>

</nav>

<header>
    <h1>Contact Us</h1>
    <p>Send us a message today</p>
</header>

<section class="contact">

<div class="container">

    <h2>Get in Touch</h2>

    <form>

        <input type="text" placeholder="Your Name" required>

        <input type="email" placeholder="Your Email" required>

        <input type="text" placeholder="Subject">

        <textarea placeholder="Write your message here..." required></textarea>

        <button type="submit">Send Message</button>

    </form>

</div>

</section>

<footer>
    © 2026 SDDR.digital • All Rights Reserved
</footer>

</body>
</html>
