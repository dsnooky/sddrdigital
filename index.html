<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDDR.digital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f172a;
    color:white;
}

/* NAVBAR */
.navbar{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 8%;
    background:#020617;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    color:#38bdf8;
    font-size:28px;
    font-weight:700;
}

.nav-links{
    display:flex;
    gap:25px;
    list-style:none;
}

.nav-links a{
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.nav-links a:hover{
    color:#38bdf8;
}

/* HERO */
.hero{
    min-height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    background:
    linear-gradient(rgba(15,23,42,0.8),rgba(15,23,42,0.8)),
    url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1400&auto=format&fit=crop') center/cover;
}

.hero-content h1{
    font-size:60px;
    margin-bottom:20px;
}

.hero-content span{
    color:#38bdf8;
}

.hero-content p{
    max-width:700px;
    margin:auto;
    color:#cbd5e1;
    line-height:1.8;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 35px;
    background:#38bdf8;
    color:#0f172a;
    text-decoration:none;
    border-radius:50px;
    font-weight:600;
}

.btn:hover{
    background:white;
}

/* FOOTER */
footer{
    background:#020617;
    text-align:center;
    padding:25px;
    color:#94a3b8;
}

/* MOBILE */
@media(max-width:768px){

.navbar{
    flex-direction:column;
    gap:15px;
}

.hero-content h1{
    font-size:40px;
}

}

</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo">SDDR.digital</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>

</nav>

<!-- HERO -->
<section class="hero">

    <div class="hero-content">

        <h1>Welcome to <span>SDDR.digital</span></h1>

        <p>
            Modern digital solutions for printing,
            graphic design, websites, online assistance,
            and creative services.
        </p>

        <a href="services.html" class="btn">View Services</a>

    </div>

</section>

<footer>
    © 2026 SDDR.digital • All Rights Reserved
</footer>

</body>
</html>
